<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FitScan — カロリー管理 & 筋トレ</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitScan">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="theme-color" content="#0F1B2D">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0F1B2D;
    --bg2: #152236;
    --bg3: #1C2E45;
    --card: #1A2B40;
    --card2: #20344E;
    --green: #00E5A0;
    --green-dim: #00b87d;
    --orange: #FF6B35;
    --blue: #4A9EFF;
    --white: #F0F4F8;
    --gray: #7A90A8;
    --gray2: #4A6180;
    --border: #253A55;
    --red: #FF4D6A;
    --yellow: #FFD166;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    /* iPhoneのセーフエリア対応 */
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    padding-top: calc(16px + env(safe-area-inset-top));
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    color: var(--white);
  }
  .logo span { color: var(--green); }

  /* ── NAV TABS ── */
  nav {
    display: flex; gap: 4px;
    background: var(--bg3);
    border-radius: 10px; padding: 4px;
  }
  nav button {
    background: none; border: none; cursor: pointer;
    color: var(--gray); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 7px 14px; border-radius: 7px;
    transition: all .2s;
    white-space: nowrap;
  }
  nav button.active {
    background: var(--card2); color: var(--white);
  }
  nav button:hover:not(.active) { color: var(--white); }

  /* ── VIEWS ── */
  .view { display: none; padding: 24px; max-width: 860px; margin: 0 auto; }
  .view.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--gray);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
  }

  /* ── STATS ROW ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; text-align: center;
  }
  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 600; color: var(--white); line-height: 1;
  }
  .stat-val.green { color: var(--green); }
  .stat-val.orange { color: var(--orange); }
  .stat-val.blue { color: var(--blue); }
  .stat-label { font-size: 11px; color: var(--gray); margin-top: 5px; font-weight: 500; }

  /* ── CALORIE RING ── */
  .calorie-center {
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .ring-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .ring-kcal { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--white); }
  .ring-sub { font-size: 9px; color: var(--gray); }
  .macro-bars { flex: 1; min-width: 180px; }
  .macro-row { margin-bottom: 10px; }
  .macro-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .macro-label span:first-child { color: var(--gray); }
  .macro-label span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--white); font-size: 11px; }
  .bar-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

  /* ── FOOD INPUT ── */
  .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .inp {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--white); font-family: 'Inter', sans-serif;
    font-size: 14px; border-radius: 10px; padding: 11px 14px;
    outline: none; transition: border .2s;
  }
  .inp:focus { border-color: var(--green); }
  .inp::placeholder { color: var(--gray2); }
  .btn {
    background: var(--green); color: #000; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
    border-radius: 10px; padding: 11px 18px; transition: all .2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--green-dim); }
  .btn-sec {
    background: var(--bg3); color: var(--white); border: 1px solid var(--border);
  }
  .btn-sec:hover { border-color: var(--green); color: var(--green); background: var(--bg3); }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 14px;
    padding: 32px; text-align: center; cursor: pointer;
    transition: all .2s; position: relative; overflow: hidden;
  }
  .upload-zone:hover { border-color: var(--green); background: rgba(0,229,160,.04); }
  .upload-zone input[type=file] { display:none; }
  .upload-icon { font-size: 36px; margin-bottom: 8px; }
  .upload-text { color: var(--gray); font-size: 13px; }
  .upload-text strong { color: var(--green); }

  /* ── SCAN ANIMATION ── */
  .scan-overlay {
    position: absolute; inset: 0; background: rgba(0,229,160,.08);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .scan-overlay.active { display: flex; }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scanMove 1.5s ease-in-out infinite;
  }
  @keyframes scanMove {
    0% { top: 10%; }
    100% { top: 90%; }
  }
  .scan-text { color: var(--green); font-size: 13px; font-weight: 600; z-index: 1; }

  /* ── MEAL TABS ── */
  .meal-tabs {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    margin-bottom: 16px;
  }
  .meal-tab {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--gray); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; border-radius: 10px;
    padding: 9px 6px; cursor: pointer; transition: all .2s;
    text-align: center; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
  }
  .meal-tab .meal-tab-icon { font-size: 18px; }
  .meal-tab .meal-tab-kcal {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--gray2);
  }
  .meal-tab.active { background: var(--card2); color: var(--white); border-color: var(--green); }
  .meal-tab.active .meal-tab-kcal { color: var(--green); }
  .meal-tab:hover:not(.active) { border-color: var(--gray2); color: var(--white); }

  /* ── FOOD LIST ── */
  .food-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--bg3);
    border-radius: 10px; margin-bottom: 8px;
  }
  .food-icon { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
  .food-name { font-size: 14px; font-weight: 500; flex: 1; }
  .food-kcal { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--orange); font-weight: 600; }
  .food-del { background: none; border: none; color: var(--gray2); cursor: pointer; font-size: 16px; padding: 4px; }
  .food-del:hover { color: var(--red); }

  .meal-section { display: none; }
  .meal-section.active { display: block; }

  /* ── MODE TOGGLE ── */
  .mode-btn {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--gray); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; border-radius: 10px;
    padding: 9px 8px; cursor: pointer; transition: all .2s;
  }
  .mode-btn.active {
    background: var(--card2); color: var(--white); border-color: var(--green);
  }
  .mode-btn:hover:not(.active) { color: var(--white); }

  /* ── SUGGESTIONS ── */
  .suggestions-box {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; margin-top: 4px; overflow: hidden;
    max-height: 220px; overflow-y: auto;
  }
  .suggestion-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--card2); }
  .suggestion-name { font-size: 14px; }
  .suggestion-kcal {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--orange); font-weight: 600; white-space: nowrap; margin-left: 8px;
  }

  /* ── SEARCH RESULT PREVIEW ── */
  .result-item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .result-item-left { display: flex; align-items: center; gap: 8px; }
  .result-item-name { font-size: 14px; }
  .result-item-kcal {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--orange); font-weight: 700;
  }
  .result-kcal-edit {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--white); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; border-radius: 6px; padding: 4px 8px;
    width: 80px; text-align: right;
  }
  .result-kcal-edit:focus { outline: none; border-color: var(--green); }
  .result-total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0 6px; font-weight: 700;
  }
  .meal-summary {
    margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;
  }
  .meal-total-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: rgba(0,229,160,.07);
    border: 1px solid rgba(0,229,160,.25); border-radius: 10px; margin-bottom: 10px;
  }
  .meal-total-label { font-size: 13px; font-weight: 700; color: var(--green); }
  .meal-total-kcal {
    font-family: 'JetBrains Mono', monospace; font-size: 18px;
    font-weight: 700; color: var(--green);
  }
  .meal-advice-box {
    background: linear-gradient(135deg, rgba(74,158,255,.08), rgba(0,229,160,.05));
    border: 1px solid rgba(74,158,255,.3); border-radius: 10px; padding: 12px 14px;
  }
  .meal-advice-header {
    display: flex; align-items: center; gap: 7px; margin-bottom: 6px;
  }
  .meal-advice-badge {
    background: var(--blue); color: #fff; font-size: 8px; font-weight: 900;
    padding: 2px 6px; border-radius: 3px; letter-spacing: 1px;
  }
  .meal-advice-title { font-size: 11px; font-weight: 700; color: var(--blue); }
  .meal-advice-text { font-size: 13px; line-height: 1.65; color: #C8DCF0; }

  /* ── MODE TOGGLE BUTTONS ── */
  .mode-btn {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--gray); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; border-radius: 10px;
    padding: 9px 10px; cursor: pointer; transition: all .2s;
  }
  .mode-btn.active {
    background: var(--card2); color: var(--white); border-color: var(--green);
  }
  .mode-btn:hover:not(.active) { color: var(--white); }

  /* ── SUGGESTIONS DROPDOWN ── */
  .suggestions-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; margin-top: 6px;
  }
  .suggestion-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--card2); }
  .suggestion-name { font-size: 14px; font-weight: 500; }
  .suggestion-kcal {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--orange); font-weight: 600;
  }
  .suggestion-note { font-size: 11px; color: var(--gray); margin-top: 2px; }

  /* ── SEARCH RESULT CARD ── */
  .result-card {
    background: var(--bg3); border: 1px solid var(--green);
    border-radius: 12px; padding: 16px; margin-top: 10px;
  }
  .result-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .result-icon { font-size: 28px; }
  .result-name { font-size: 16px; font-weight: 700; }
  .result-source { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .result-kcal-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .result-kcal-label { font-size: 13px; color: var(--gray); }
  .result-kcal-inp {
    width: 90px; background: var(--bg2); border: 1px solid var(--border);
    color: var(--green); font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700; border-radius: 8px;
    padding: 4px 8px; text-align: right; outline: none;
  }
  .result-kcal-inp:focus { border-color: var(--green); }
  .result-macros {
    display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .result-macro {
    font-size: 12px; color: var(--gray);
    background: var(--bg2); border-radius: 6px; padding: 4px 8px;
  }
  .result-macro span { color: var(--white); font-weight: 600; }

  /* ── AI RESULT ── */
  .ai-result {
    background: var(--bg3); border: 1px solid var(--green);
    border-radius: 12px; padding: 16px; margin-top: 12px;
    display: none;
  }
  .ai-result.show { display: block; }
  .ai-result-title { color: var(--green); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .ai-result-body { font-size: 14px; line-height: 1.7; color: var(--white); }

  /* ── LOADING DOTS ── */
  .dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); margin: 0 2px;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dotPulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── BODY FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; color: var(--gray); font-weight: 500; }
  select.inp option { background: var(--bg2); }

  /* ── WORKOUT CARDS ── */
  .workout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .workout-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; position: relative; overflow: hidden;
  }
  .workout-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .workout-card.beginner::before { background: var(--green); }
  .workout-card.intermediate::before { background: var(--blue); }
  .workout-card.advanced::before { background: var(--orange); }
  .workout-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .workout-sets { font-size: 12px; color: var(--gray); margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; }
  .workout-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: .5px; text-transform: uppercase;
  }
  .workout-card.beginner .workout-tag { background: rgba(0,229,160,.15); color: var(--green); }
  .workout-card.intermediate .workout-tag { background: rgba(74,158,255,.15); color: var(--blue); }
  .workout-card.advanced .workout-tag { background: rgba(255,107,53,.15); color: var(--orange); }
  .workout-done-btn {
    display: block; width: 100%; margin-top: 12px;
    background: none; border: 1px solid var(--border); color: var(--gray);
    font-size: 12px; font-weight: 600; border-radius: 8px; padding: 7px;
    cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
  }
  .workout-done-btn.done {
    background: rgba(0,229,160,.12); border-color: var(--green); color: var(--green);
  }
  .workout-done-btn:hover:not(.done) { border-color: var(--green); color: var(--green); }

  /* ── HISTORY ── */
  .history-day {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
  }
  .history-date {
    font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-badge {
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    font-weight: 700; letter-spacing: .5px;
  }
  .badge-good { background: rgba(0,229,160,.15); color: var(--green); }
  .badge-warn { background: rgba(255,209,102,.15); color: var(--yellow); }
  .badge-over { background: rgba(255,77,106,.15); color: var(--red); }
  .history-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .history-row span:first-child { color: var(--gray); }
  .history-row span:last-child { font-family: 'JetBrains Mono', monospace; }

  /* ── AI ADVICE BOX ── */
  .advice-box {
    background: linear-gradient(135deg, rgba(0,229,160,.08), rgba(74,158,255,.05));
    border: 1px solid rgba(0,229,160,.3); border-radius: 14px; padding: 18px;
    margin-bottom: 16px;
  }
  .advice-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .advice-ai-badge {
    background: var(--green); color: #000; font-size: 9px; font-weight: 900;
    padding: 3px 7px; border-radius: 4px; letter-spacing: 1px;
  }
  .advice-title { font-size: 14px; font-weight: 700; }
  .advice-body { font-size: 13px; line-height: 1.7; color: #C8DCF0; }

  /* ── WEEK GRID ── */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
  .week-day { text-align: center; }
  .week-day-label { font-size: 10px; color: var(--gray); margin-bottom: 5px; }
  .week-dot {
    width: 100%; aspect-ratio: 1; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .week-dot.done { background: rgba(0,229,160,.2); border-color: var(--green); }
  .week-dot.over { background: rgba(255,77,106,.15); border-color: var(--red); }
  .week-dot.warn { background: rgba(255,209,102,.15); border-color: var(--yellow); }

  /* ── IMG PREVIEW ── */
  .img-preview { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 10px; display: none; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── RESPONSIVE ── */
  @media(max-width:600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    nav button { padding: 7px 10px; font-size: 12px; }
    .calorie-center { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fit<span>Scan</span></div>
  <nav>
    <button class="active" onclick="showView('calorie')">🍽 カロリー</button>
    <button onclick="showView('workout')">💪 筋トレ</button>
    <button onclick="showView('history')">📊 記録</button>
  </nav>
</header>

<!-- ── CALORIE VIEW ── -->
<div id="view-calorie" class="view active">

  <!-- Today Summary -->
  <div class="card">
    <div class="card-title">今日の摂取状況</div>
    <div class="calorie-center">
      <div class="ring-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="45" fill="none" stroke="#1C2E45" stroke-width="10"/>
          <circle id="ringFill" cx="55" cy="55" r="45" fill="none"
            stroke="#00E5A0" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="282.7" stroke-dashoffset="282.7"
            style="transition:stroke-dashoffset .8s ease"/>
        </svg>

<script>
// ────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────
const GOAL_KCAL = 2000;
const MEALS = {
  breakfast: { label:'朝食', icon:'🌅' },
  lunch:     { label:'昼食', icon:'☀️' },
  dinner:    { label:'夕食', icon:'🌙' },
  snack:     { label:'その他', icon:'🍫' },
};
let currentMeal = 'breakfast';
let todayFoods = {
  breakfast: { items:[], advice:'' },
  lunch:     { items:[], advice:'' },
  dinner:    { items:[], advice:'' },
  snack:     { items:[], advice:'' },
};
let todayMacros = { carb:0, prot:0, fat:0 };
let workoutDone = {};
const STORAGE_KEY = 'fitscan_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { logs: {}, weights: {} };
  } catch { return { logs: {}, weights: {} }; }
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

// ────────────────────────────────────────────
// MEAL TAB SWITCHING
// ────────────────────────────────────────────
const MEAL_TITLES = { breakfast:'朝食の記録', lunch:'昼食の記録', dinner:'夕食の記録', snack:'その他の記録' };

function switchMeal(meal) {
  currentMeal = meal;
  document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+meal).classList.add('active');
  document.querySelectorAll('.meal-section').forEach(s => s.classList.remove('active'));
  document.getElementById('foodList-'+meal).classList.add('active');
  document.getElementById('mealListTitle').textContent = MEAL_TITLES[meal];
  // Show/hide summary for this meal
  ['breakfast','lunch','dinner','snack'].forEach(m => {
    const sumEl = document.getElementById('mealSummary-'+m);
    if (sumEl) sumEl.style.display = (m === meal && (todayFoods[m].items||[]).length) ? 'block' : 'none';
  });
  document.getElementById('searchResult').style.display = 'none';
  document.getElementById('searchResult').innerHTML = '';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('aiResult') && document.getElementById('aiResult').classList.remove('show');
}

// ────────────────────────────────────────────
// VIEW SWITCHING
// ────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'history') renderHistory();
}

// ────────────────────────────────────────────
// CALORIE / FOOD
// ────────────────────────────────────────────
function recalcMacros() {
  todayMacros = { carb:0, prot:0, fat:0 };
  Object.values(todayFoods).flatMap(m => m.items).forEach(f => {
    todayMacros.carb += f.carb||0;
    todayMacros.prot += f.prot||0;
    todayMacros.fat  += f.fat||0;
  });
}

function updateCalorieUI() {
  const total = Object.values(todayFoods).flatMap(m => m.items).reduce((s,f) => s+f.kcal, 0);
  document.getElementById('totalKcal').textContent = total;
  const pct = Math.min(total / GOAL_KCAL, 1);
  const circumference = 2 * Math.PI * 45;
  document.getElementById('ringFill').style.strokeDashoffset = circumference * (1 - pct);
  document.getElementById('ringFill').style.stroke = total > GOAL_KCAL ? '#FF4D6A' : '#00E5A0';

  const { carb, prot, fat } = todayMacros;
  document.getElementById('carbVal').textContent = `${Math.round(carb)}g / 250g`;
  document.getElementById('protVal').textContent = `${Math.round(prot)}g / 120g`;
  document.getElementById('fatVal').textContent  = `${Math.round(fat)}g / 65g`;
  document.getElementById('carbBar').style.width = Math.min(carb/250*100,100)+'%';
  document.getElementById('protBar').style.width = Math.min(prot/120*100,100)+'%';
  document.getElementById('fatBar').style.width  = Math.min(fat/65*100,100)+'%';
  document.getElementById('remainKcal').textContent = Math.max(GOAL_KCAL - total, 0);

  // Update per-meal kcal badges on tabs
  Object.keys(MEALS).forEach(meal => {
    const mkcal = (todayFoods[meal].items||[]).reduce((s,f) => s+f.kcal, 0);
    document.getElementById('tab-kcal-'+meal).textContent = mkcal > 0 ? mkcal+' kcal' : '0 kcal';
  });

  // Save to storage
  const data = loadData();
  data.logs[todayKey()] = { kcal: total, carb: todayMacros.carb, prot: todayMacros.prot, fat: todayMacros.fat, meals: JSON.parse(JSON.stringify(todayFoods)), workoutDone: { ...workoutDone } };
  saveData(data);
}

function renderFoodList(meal) {
  const el = document.getElementById('foodList-'+meal);
  const sumEl = document.getElementById('mealSummary-'+meal);
  const foods = todayFoods[meal].items || [];

  if (!foods.length) {
    el.innerHTML = '<p style="color:var(--gray);font-size:13px">まだ記録がありません</p>';
    sumEl.style.display = 'none';
    return;
  }

  el.innerHTML = foods.map((f,i) => `
    <div class="food-item">
      <div class="food-icon">${f.icon}</div>
      <div class="food-name">${f.name}</div>
      <div class="food-kcal">${f.kcal} kcal</div>
      <button class="food-del" onclick="removeFood('${meal}',${i})">✕</button>
    </div>`).join('');

  const total = foods.reduce((s,f) => s+f.kcal, 0);
  const advice = todayFoods[meal].advice || '';

  sumEl.style.display = 'block';
  sumEl.innerHTML = `
    <div class="meal-total-row">
      <span class="meal-total-label">🍽 合計</span>
      <span class="meal-total-kcal">${total} kcal</span>
    </div>
    ${advice ? `
    <div class="meal-advice-box">
      <div class="meal-advice-header">
        <span class="meal-advice-badge">AI</span>
        <span class="meal-advice-title">ワンポイントアドバイス</span>
      </div>
      <div class="meal-advice-text">${advice}</div>
    </div>` : `
    <div class="meal-advice-box" id="adviceLoading-${meal}">
      <div class="meal-advice-header">
        <span class="meal-advice-badge">AI</span>
        <span class="meal-advice-title">ワンポイントアドバイス</span>
      </div>
      <div class="meal-advice-text"><span class="dots"><span></span><span></span><span></span></span></div>
    </div>`}`;
}

function removeFood(meal, i) {
  todayFoods[meal].items.splice(i,1);
  if (!todayFoods[meal].items.length) todayFoods[meal].advice = '';
  recalcMacros();
  renderFoodList(meal);
  updateCalorieUI();
}

function addFoodItems(items, advice) {
  // items: [{name,kcal,carb,prot,fat,icon}, ...]
  todayFoods[currentMeal].items.push(...items);
  todayFoods[currentMeal].advice = advice;
  recalcMacros();
  renderFoodList(currentMeal);
  updateCalorieUI();
}

// 検索関数：入力に部分一致する候補を返す
function searchFoods(query) {
  if (!query || query.length < 1) return [];
  const q = query.toLowerCase().trim();
  return FOOD_DB.filter(f => f.name.toLowerCase().includes(q)).slice(0, 6);
}

// ────────────────────────────────────────────
// MODE SWITCH (search / manual)
// ────────────────────────────────────────────
function switchMode(mode) {
  document.getElementById('modeSearch').classList.toggle('active', mode === 'search');
  document.getElementById('modeManual').classList.toggle('active', mode === 'manual');
  document.getElementById('panelSearch').style.display = mode === 'search' ? 'block' : 'none';
  document.getElementById('panelManual').style.display = mode === 'manual' ? 'block' : 'none';
  // clear state
  document.getElementById('foodInput').value = '';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('searchResult').innerHTML = '';
  document.getElementById('searchResult').style.display = 'none';
}

// ────────────────────────────────────────────
// SEARCH MODE
// ────────────────────────────────────────────
let selectedFood = null; // 現在プレビュー中の食品

function onFoodInput() {
  const q = document.getElementById('foodInput').value.trim();
  const box = document.getElementById('suggestions');
  const results = searchFoods(q);
  selectedFood = null;
  document.getElementById('searchResult').style.display = 'none';
  document.getElementById('searchResult').innerHTML = '';

  if (!q || !results.length) { box.style.display = 'none'; return; }

  box.style.display = 'block';
  box.innerHTML = results.map((f, i) => `
    <div class="suggestion-item" onclick="selectFood(${i}, ${JSON.stringify(f).replace(/"/g,'&quot;')})">
      <div>
        <div class="suggestion-name">${f.icon} ${f.name}</div>
        <div class="suggestion-note">P:${f.prot}g / C:${f.carb}g / F:${f.fat}g</div>
      </div>
      <div class="suggestion-kcal">${f.kcal} kcal</div>
    </div>`).join('');
}

function selectFood(i, food) {
  selectedFood = { ...food };
  document.getElementById('foodInput').value = food.name;
  document.getElementById('suggestions').style.display = 'none';
  showFoodPreview(food);
}

  const q = document.getElementById('foodInput').value.trim();
  if (!q) return;
  document.getElementById('suggestions').style.display = 'none';

  const results = searchFoods(q);
  if (results.length > 0) {
    // DBヒット → そのまま表示
    selectedFood = { ...results[0] };
    showFoodPreview(results[0], 'db');
  } else {
    // DBミス → AI+Web検索にフォールバック
    showFoodPreviewLoading(q);
    const food = await searchCaloriesWithAI(q);
    selectedFood = food;
    showFoodPreview(food, 'ai');
  }
}

// AI + Web検索でカロリーを調べる
async function searchCaloriesWithAI(name) {
  const system = `あなたは栄養士AIです。ユーザーが指定した料理・食品のカロリーと栄養素を、
一般的な栄養成分データベースや食品標準成分表の知識をもとに正確に回答してください。
必ず以下のJSON形式のみで返答（前置き・説明・マークダウン不要）:
{"name":"料理名","kcal":数値,"carb":数値,"prot":数値,"fat":数値,"icon":"絵文字1文字","source":"参考情報（例：文部科学省食品成分表、一般的な栄養データより）"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system,
        messages: [{ role: 'user', content: `「${name}」のカロリーと栄養素を調べてください。` }]
      })
    });
    const data = await res.json();
    // テキストブロックを結合してJSONを取得
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text).join('');
    const json = JSON.parse(text.replace(/```json|```/g, '').trim());
    return {
      name: json.name || name,
      kcal: json.kcal || 0,
      carb: json.carb || 0,
      prot: json.prot || 0,
      fat:  json.fat  || 0,
      icon: json.icon || '🍽',
      source: json.source || 'AI調査',
    };
  } catch {
    // AI失敗時はキーワード推定にフォールバック
    return estimateCalories(name);
  }
}

// 名前から簡易推定（AI失敗時の最終フォールバック）
function estimateCalories(name) {
  const rules = [
    { k:['ラーメン','らーめん'],            kcal:500, carb:65, prot:18, fat:15, icon:'🍜' },
    { k:['カレー'],                         kcal:650, carb:88, prot:18, fat:18, icon:'🍛' },
    { k:['丼','どんぶり'],                  kcal:600, carb:80, prot:22, fat:15, icon:'🍚' },
    { k:['パスタ','スパゲ'],                kcal:420, carb:65, prot:12, fat:10, icon:'🍝' },
    { k:['ピザ'],                           kcal:300, carb:35, prot:12, fat:11, icon:'🍕' },
    { k:['サラダ','野菜'],                  kcal:60,  carb:8,  prot:2,  fat:2,  icon:'🥗' },
    { k:['ご飯','ごはん','白米','玄米'],     kcal:252, carb:55, prot:4,  fat:0.5,icon:'🍚' },
    { k:['パン','トースト'],                kcal:160, carb:30, prot:5,  fat:3,  icon:'🍞' },
    { k:['肉','ステーキ','焼肉'],           kcal:400, carb:2,  prot:25, fat:30, icon:'🥩' },
    { k:['魚','焼き魚','刺身'],             kcal:180, carb:0,  prot:25, fat:6,  icon:'🐟' },
    { k:['卵','たまご','エッグ'],           kcal:90,  carb:0.5,prot:7,  fat:6,  icon:'🥚' },
    { k:['スープ','汁','みそ'],             kcal:50,  carb:5,  prot:3,  fat:2,  icon:'🍵' },
    { k:['ケーキ','スイーツ','デザート'],   kcal:300, carb:40, prot:4,  fat:12, icon:'🍰' },
    { k:['コーヒー','紅茶','お茶'],         kcal:5,   carb:1,  prot:0,  fat:0,  icon:'☕' },
    { k:['ジュース','ドリンク'],            kcal:100, carb:25, prot:0,  fat:0,  icon:'🧃' },
  ];
  const n = name.toLowerCase();
  for (const r of rules) {
    if (r.k.some(k => n.includes(k))) {
      return { name, kcal:r.kcal, carb:r.carb, prot:r.prot, fat:r.fat, icon:r.icon, source:'キーワード推定' };
    }
  }
  return { name, kcal:300, carb:30, prot:10, fat:10, icon:'🍽', source:'キーワード推定' };
}

function updateWorkout() {
  const cw = parseFloat(document.getElementById('currentWeight').value);
  const tw = parseFloat(document.getElementById('targetWeight').value);
  const h  = parseFloat(document.getElementById('height').value);
  const lv = document.getElementById('level').value;

  // 入力値を自動保存
  const data = loadData();
  data.profile = { cw: cw||null, tw: tw||null, h: h||null, lv };
  // 体重を日付付きで記録（履歴で体重推移を追えるように）
  if (cw) {
    if (!data.weightLog) data.weightLog = {};
    data.weightLog[todayKey()] = cw;
  }
  saveData(data);

  if (!cw || !h) return;
  document.getElementById('bodyStats').style.display = 'grid';
  const bmi = (cw / ((h/100)**2)).toFixed(1);
  const diff = tw ? (cw - tw).toFixed(1) : '—';
  const tdee = Math.round(cw * 22 * 1.4);
  document.getElementById('bmiVal').textContent = bmi;
  document.getElementById('diffVal').textContent = diff > 0 ? `-${diff}` : diff === '—' ? '—' : `+${Math.abs(diff)}`;
  document.getElementById('tdeeVal').textContent = tdee;
}

function restoreProfile() {
  const data = loadData();
  const p = data.profile;
  if (!p) return;
  if (p.cw) document.getElementById('currentWeight').value = p.cw;
  if (p.tw) document.getElementById('targetWeight').value  = p.tw;
  if (p.h)  document.getElementById('height').value        = p.h;
  if (p.lv) document.getElementById('level').value         = p.lv;
  // 値が復元されたらUIも更新
  if (p.cw && p.h) updateWorkout();
}

  const system = `あなたはパーソナルトレーナーAIです。ユーザーの体重・目標をもとに、ポイントを日本語で簡潔に（150字以内）アドバイスしてください。`;

  try {
    const res = await callClaude(system, msg);
    document.getElementById('workoutResultBody').innerHTML = res;
  } catch {
    document.getElementById('workoutResultBody').innerHTML = '体組成を分析しました。左記のメニューを今日のトレーニングとして頑張りましょう！';
  }
}

function toggleDone(i, name) {
  const btn = document.getElementById('done-'+i);
  workoutDone[name] = !workoutDone[name];
  btn.textContent = workoutDone[name] ? '✓ 完了！' : '完了としてマーク';
  btn.classList.toggle('done', workoutDone[name]);
  // Update storage
  const data = loadData();
  const key = todayKey();
  if (!data.logs[key]) data.logs[key] = { kcal:0, carb:0, prot:0, fat:0, workoutDone:{} };
  data.logs[key].workoutDone = { ...workoutDone };
  saveData(data);
}

// HISTORY
// ────────────────────────────────────────────
function renderHistory() {
  const data = loadData();
  const logs = data.logs;
  const keys = Object.keys(logs).sort().reverse();

  // Week grid
  const days = ['月','火','水','木','金','土','日'];
  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay() + 1);
  let weekHTML = '';
  for (let i=0; i<7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    const key = d.toISOString().slice(0,10);
    const log = logs[key];
    let cls='', emoji='○';
    if (log) {
      if (log.kcal <= GOAL_KCAL * 1.05) { cls='done'; emoji='✓'; }
      else if (log.kcal <= GOAL_KCAL * 1.15) { cls='warn'; emoji='△'; }
      else { cls='over'; emoji='✕'; }
    }
    weekHTML += `<div class="week-day"><div class="week-day-label">${days[i]}</div><div class="week-dot ${cls}">${emoji}</div></div>`;
  }
  document.getElementById('weekGrid').innerHTML = weekHTML;

  // History list
  const histEl = document.getElementById('historyList');
  if (!keys.length) {
    histEl.innerHTML = '<div class="card" style="color:var(--gray);text-align:center;padding:32px">まだ記録がありません。食事を記録してみましょう！</div>';
    return;
  }
  histEl.innerHTML = keys.slice(0,7).map(k => {
    const log = logs[k];
    const kcalColor = log.kcal > GOAL_KCAL*1.1 ? 'var(--red)' : log.kcal > GOAL_KCAL*.9 ? 'var(--yellow)' : 'var(--green)';
    const badgeCls = log.kcal > GOAL_KCAL*1.1 ? 'badge-over' : log.kcal > GOAL_KCAL*.9 ? 'badge-warn' : 'badge-good';
    const badgeTxt = log.kcal > GOAL_KCAL*1.1 ? '超過' : log.kcal > GOAL_KCAL*.9 ? '目標内' : '良好';
    const doneCount = log.workoutDone ? Object.values(log.workoutDone).filter(Boolean).length : 0;
    const mealRows = log.meals ? Object.entries({breakfast:'🌅 朝食',lunch:'☀️ 昼食',dinner:'🌙 夕食',snack:'🍫 その他'}).map(([key,label]) => {
      const foods = (log.meals[key]?.items || log.meals[key] || []);
      if (!foods.length) return '';
      const mkcal = foods.reduce((s,f)=>s+f.kcal,0);
      return `<div class="history-row"><span style="padding-left:8px">${label}</span><span>${mkcal} kcal (${foods.map(f=>f.name).join('、')})</span></div>`;
    }).join('') : '';
    return `<div class="history-day">
      <div class="history-date">${k}<span class="history-badge ${badgeCls}">${badgeTxt}</span></div>
      <div class="history-row"><span>合計カロリー</span><span style="color:${kcalColor}">${log.kcal} kcal</span></div>
      ${mealRows}
      <div class="history-row" style="margin-top:6px"><span>タンパク質 / 炭水化物 / 脂質</span><span>${Math.round(log.prot||0)}g / ${Math.round(log.carb||0)}g / ${Math.round(log.fat||0)}g</span></div>
      <div class="history-row"><span>筋トレ完了</span><span style="color:${doneCount>0?'var(--green)':'var(--gray)'}">${doneCount} 種目</span></div>
    </div>`;
  }).join('');
}

async function generateAIAdvice() {
  const data = loadData();
  const logs = data.logs;

  if (!keys.length) { alert('記録がありません'); return; }

  }
}

// ────────────────────────────────────────────
// CLAUDE API
// ────────────────────────────────────────────
async function callClaude(system, userMsg) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  const data = await res.json();
  return data.content.map(b => b.text||'').join('');
}

async function callClaudeWithImage(system, base64, mediaType) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: 'この食事のカロリーと栄養素を推定してください。' }
        ]
      }]
    })
  });
  const data = await res.json();
  return data.content.map(b => b.text||'').join('');
}
